[editor]
line-number = "relative"
cursorline = true
mouse = true
color-modes = true
auto-save = true
auto-format = true
auto-completion = true
auto-pairs = true
bufferline = "multiple"
true-color = true
rulers = [100]
shell = ["bash", "-c"]

[editor.cursor-shape]
normal = "block"
insert = "bar"
select = "underline"

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = ["file-type"]
right = ["diagnostics", "selections", "position", "position-percentage", "file-encoding", "total-line-numbers"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
enable = true
display-messages = true
display-inlay-hints = true
snippets = true
auto-signature-help = true
display-signature-help-docs = true

[editor.whitespace.render]
space = "none"
tab = "all"
newline = "none"

[editor.whitespace.characters]
tab = "→"
tabpad = " "

[editor.soft-wrap]
enable = false
wrap-at-text-width = false

[editor.file-picker]
hidden = false

[editor.search]
smart-case = true

[keys.normal]
"C-s" = ":write"
"C-w" = ":buffer-close"
"C-right" = ":buffer-next"
"C-left" = ":buffer-previous"

[keys.insert]
"C-s" = ["normal_mode", ":write"]
