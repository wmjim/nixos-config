# Catppuccin Mocha 配色
ctp_base="#1e1e2e"
ctp_mantle="#181825"
ctp_crust="#11111b"
ctp_surface0="#313244"
ctp_surface1="#45475a"
ctp_surface2="#585b70"
ctp_overlay0="#6c7086"
ctp_overlay1="#7f849c"
ctp_overlay2="#9399b2"
ctp_subtext0="#a6adc8"
ctp_subtext1="#bac2de"
ctp_text="#cdd6f4"
ctp_lavender="#b4befe"
ctp_blue="#89b4fa"
ctp_sapphire="#74c7ec"
ctp_sky="#89dceb"
ctp_teal="#94e2d5"
ctp_green="#a6e3a1"
ctp_yellow="#f9e2af"
ctp_peach="#fab387"
ctp_maroon="#eba0ac"
ctp_red="#f38ba8"
ctp_mauve="#cba6f7"
ctp_pink="#f5c2e7"
ctp_flamingo="#f2cdcd"
ctp_rosewater="#f5e0dc"

set -g status-position top
set -g status-interval 1
set -g display-time 1000
set -g status-justify absolute-centre
set -g status-left-length 50
set -g status-right-length 50

set -g message-style "fg=${ctp_crust},bg=${ctp_teal},bold"

set -g status-style "fg=${ctp_text},bg=default"

# 会话名：高亮（mauve 底 crust 字加粗）
block_session="#[fg=${ctp_crust},bg=${ctp_mauve},bold]  #S #[default]"
set -g status-left "${block_session}"
# 当前路径：弱化（透明底，overlay0 文字）
block_dir="#[fg=${ctp_overlay0},bg=default,nobold]  #{?#{==:#{pane_current_path},#{HOME}},~,#{b:pane_current_path}} #[default]"
set -ag status-left "${block_dir}"

set -g window-status-separator ""
block_window_nostyle="#{?#{>:#{window_panes},1}, , }#{?window_zoomed_flag, ,}#I #W"
# 未激活窗口：暗淡（透明底，overlay0 文字）
set -g window-status-format "#[fg=${ctp_overlay0},bg=default,nobold] ${block_window_nostyle} #[default]"
# 当前窗口：高亮（blue 底 crust 字加粗）
set -g window-status-current-format "#[fg=${ctp_crust},bg=${ctp_blue},bold] ${block_window_nostyle} #[default]"

# prefix/COPY 状态：触发时高亮（yellow 底/ red 底 crust 字加粗），平时不显示
block_prefix="#{?client_prefix,#[fg=${ctp_crust}]#[bg=${ctp_yellow}]#[bold]  ^A,#{?pane_in_mode,#[fg=${ctp_crust}]#[bg=${ctp_red}]#[bold]  COPY,}} #[default]"
set -g status-right "${block_prefix}"

# CPU/RAM：弱化（透明底，overlay0 文字）
sh_cpu="#($HOME/.config/tmux/themes/scripts/cpu_percentage.sh)"
sh_ram="#($HOME/.config/tmux/themes/scripts/ram_percentage.sh)"
block_cpu_ram="#[fg=${ctp_overlay0},bg=default,nobold]  ${sh_cpu}   ${sh_ram} #[default]"
set -ag status-right "${block_cpu_ram}"

# 时间：中性（透明底，text 文字，不加粗）
block_time="#[fg=${ctp_text},bg=default,nobold] 󱛡 %H:%M #[default]"
set -ag status-right "${block_time}"

# 面板边框：未激活弱化、激活时 sapphire 突出
set -g pane-border-style "bg=default,fg=${ctp_surface0}"
set -g pane-active-border-style "bg=default,fg=${ctp_sapphire}"
set -g display-panes-colour "${ctp_overlay0}"
set -g display-panes-active-colour "${ctp_sapphire}"
set -g pane-border-lines single

set -g pane-border-status top
# 面板标题：未激活暗淡、激活时柔和文字
set -g pane-border-format "#{?pane_active,#[fg=${ctp_text}]#[nobold],#[fg=${ctp_overlay0}]#[nobold]} #{pane_index} #{pane_current_command} #[default]"